name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build · test · scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build (changed modules only on PRs)
        run: ./gradlew check --build-cache --configuration-cache

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/problems/
          retention-days: 7

  sbom-and-scan:
    name: SBOM + Trivy
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Build jars (no tests, faster)
        run: ./gradlew assemble --build-cache

      - name: Generate SBOM (CycloneDX) for each service
        run: |
          mkdir -p sboms
          for svc in services/*/; do
            name=$(basename "$svc")
            jar=$(ls "$svc"build/libs/*-boot.jar 2>/dev/null | head -1) || continue
            [ -n "$jar" ] || continue
            docker run --rm -v "$PWD":/src cyclonedx/cyclonedx-cli:0.27.2 \
              add files --input-file "/src/$jar" --output-file "/src/sboms/$name.bom.json" || true
          done
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          skip-dirs: '.gradle,build,**/build'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sboms
          path: sboms/
          retention-days: 30
