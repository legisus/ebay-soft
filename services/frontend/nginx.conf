# Static SPA served by nginx in production. Traefik terminates TLS in front of
# us — this listens plain :80 inside the docker network only.

server {
    listen 80 default_server;
    server_name _;

    # Static files served from the Vite build output.
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Long-cache hashed assets; never cache index.html (so deploys land
    # immediately for returning users).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Container healthcheck endpoint — used by docker compose healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # SPA history-mode fallback: anything that isn't a real file falls through
    # to index.html so react-router can handle /signup, /login, /dashboard, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
