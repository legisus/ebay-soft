services:
  api-gateway:
    image: ghcr.io/legisus/ebay-soft-api-gateway:latest
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    mem_limit: 700m
    environment:
      EBAY_SOFT_AUTH_API_URL: http://auth-api:8081
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: api-gateway
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError -Xss512k"
    expose:
      - "8080"
      # Management port — actuator (incl. /actuator/prometheus) lives here.
      # docker-internal only; never published. Prometheus scrapes this directly.
      - "9080"
    depends_on:
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    # Healthcheck hits the management port now that actuator moved off 8080.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    labels:
      # Traefik labels live here for legacy reasons but the actual routing is in
      # infra/traefik/dynamic.yml (file provider). Keep these as a safety net.
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=PathPrefix(`/v1`)"
      - "traefik.http.routers.api-gateway.entrypoints=web"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8080"
