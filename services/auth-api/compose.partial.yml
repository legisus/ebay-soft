services:
  auth-api:
    # In CI/prod the image comes from GHCR (built by .github/workflows/deploy.yml).
    # `build:` is kept so `docker compose build` still works for local dev.
    image: ghcr.io/legisus/ebay-soft-auth-api:latest
    build:
      context: ../..
      dockerfile: services/auth-api/Dockerfile
    restart: unless-stopped
    # Cap each JVM at 700 MB. With MaxRAMPercentage=70 the heap caps at ~490 MB,
    # leaving ~200 MB for non-heap (metaspace, codecache, threads). Without this
    # limit each container sees the host's full 8 GB and 5 JVMs OOM-kill each other.
    mem_limit: 700m
    environment:
      EBAY_SOFT_AUTH_DB_URL: jdbc:postgresql://postgres:5432/ebay_soft?currentSchema=auth
      EBAY_SOFT_AUTH_DB_USER: auth_api
      EBAY_SOFT_AUTH_DB_PASSWORD: ${EBAY_SOFT_AUTH_DB_PASSWORD:-auth_api}
      EBAY_SOFT_INTERNAL_JWT_SECRET: ${EBAY_SOFT_INTERNAL_JWT_SECRET}
      # Pre-Argon2 HMAC pepper (#159). 32+ bytes random, base64-encoded. Lives in
      # /etc/ebay-soft/env; never in this repo. If missing, the auth-api app defaults
      # to a clearly-marked dev-only value (app.yml) — fine for dev, refused-at-init
      # if you ever set this to <32 bytes.
      EBAY_SOFT_PASSWORD_PEPPER_V1: ${EBAY_SOFT_PASSWORD_PEPPER_V1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: auth-api
      # -Xss512k halves the per-thread stack from the 1 MB default — Spring Boot keeps ~30 threads
      # at idle, so this trims ~15 MB per JVM. Adds up to ~75 MB across 5 services on the small box.
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError -Xss512k"
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s
