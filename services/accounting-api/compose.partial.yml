services:
  accounting-api:
    build:
      context: ../..
      dockerfile: services/accounting-api/Dockerfile
    restart: unless-stopped
    environment:
      EBAY_SOFT_ACCOUNTING_DB_URL: jdbc:postgresql://postgres:5432/ebay_soft?currentSchema=accounting
      EBAY_SOFT_ACCOUNTING_DB_USER: accounting_api
      EBAY_SOFT_ACCOUNTING_DB_PASSWORD: ${EBAY_SOFT_ACCOUNTING_DB_PASSWORD:-accounting_api}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: accounting-api
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError"
    expose:
      - "8084"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s
