global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
        labels: { service: api-gateway }

  - job_name: auth-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-api:8081"]
        labels: { service: auth-api }
