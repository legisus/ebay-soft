# Traefik dynamic config — file provider. Hot-reloaded by traefik when this file
# changes. One router block per (service × entryPoint).

http:
  routers:
    # HTTP → 308 redirect to HTTPS. Survives until we move the redirect to
    # Cloudflare Page Rules (cheaper, fewer round-trips).
    api-gateway-redirect:
      rule: "PathPrefix(`/`)"
      entryPoints: ["web"]
      middlewares: ["to-https"]
      service: noop                  # never reached; middleware short-circuits
      priority: 1

    api-gateway:
      # Public surface = our v1 API only. Actuator endpoints live on api-gateway's
      # internal management port (9080) and are not routed publicly; before this
      # change Traefik forwarded /actuator/* and /actuator/prometheus leaked 26 KB
      # of internal metrics to the world.
      rule: "PathPrefix(`/v1`)"
      entryPoints: ["websecure"]
      service: api-gateway
      tls: {}

    # Everything else on HTTPS hits the SPA. Lower-priority `PathPrefix("/")`
    # means /v1 and /actuator still win — Traefik picks the more specific rule.
    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: ["websecure"]
      service: frontend
      tls: {}
      priority: 1

  middlewares:
    to-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    api-gateway:
      loadBalancer:
        servers:
          - url: "http://api-gateway:8080"
        passHostHeader: true
        healthCheck:
          # Actuator moved to api-gateway's management port (9080) but Traefik
          # talks to the public port (8080) — use a real /v1/* route as the
          # signal instead. /v1/health proxies to auth-api and returns 200
          # whenever the platform is reachable end-to-end.
          path: /v1/health
          interval: 10s
          timeout: 3s

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
        passHostHeader: true
        healthCheck:
          path: /healthz
          interval: 10s
          timeout: 3s

    # Stub used by the redirect router; never receives traffic.
    noop:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:1"

tls:
  certificates:
    - certFile: /etc/traefik/certs/ebay-soft.com.pem
      keyFile:  /etc/traefik/certs/ebay-soft.com.key
