# Production-like Docker Compose stack — one declaration per service partial.
# Each services/<svc>/compose.partial.yml owns its own block; this root file
# composes them together with the shared infra (postgres / redis / traefik /
# observability). Spin up locally with:
#
#     docker compose -f compose.prod.yml up -d
#
# Service count grows phase-by-phase. Add the next partial under `include:`
# when the service ships its compose.partial.yml.

name: ebay-soft

include:
  - services/api-gateway/compose.partial.yml
  - services/auth-api/compose.partial.yml
  - services/ebay-conn-api/compose.partial.yml
  - services/sync-api/compose.partial.yml
  - services/accounting-api/compose.partial.yml
  - services/frontend/compose.partial.yml

networks:
  default:
    name: ebay-soft

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ebay_soft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bound to localhost only. Inter-container traffic goes via docker DNS
      # (postgres:5432). The host-side publish is just for SSH-tunnelled
      # admin access (pgcli over `ssh -L 5432:localhost:5432`).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      # localhost-only; services reach redis via docker DNS (redis:6379).
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    command:
      # File provider — simpler than the docker provider, immune to daemon API drift.
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
      - --api.insecure=true   # dev-only — disable behind auth in real prod
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
      # Dashboard exposed on localhost only — earlier audit showed 8090 was
      # actually reachable from the internet (the DOCKER-USER iptables rule
      # didn't cover it). Tunnel via `ssh -L 8090:localhost:8090` to use it.
      - "127.0.0.1:8090:8080"
    volumes:
      - ./infra/traefik:/etc/traefik/dynamic:ro
      # Cloudflare Origin Cert + key — bind-mounted read-only from host.
      # Files live at /etc/ebay-soft/certs/ on the host, never in this repo.
      - /etc/ebay-soft/certs:/etc/traefik/certs:ro

  # Observability — see infra/observability/* for configs. Tempo (distributed
  # traces) is omitted on the small box to save ~400 MB; bring it back once we
  # move to the AX102 or migrate observability to a managed tier. Services keep
  # emitting OTLP traces — they're just not collected here.
  loki:
    image: grafana/loki:3.3.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki

  prometheus:
    image: prom/prometheus:v3.0.1
    mem_limit: 256m
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

  # Host metrics exporter — CPU, memory, disk, filesystem, network counters.
  # Bind-mounts /proc + /sys read-only so it sees the actual host (not the
  # container's namespace). 9100 is the well-known port.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    mem_limit: 64m
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    pid: host
    restart: unless-stopped

  # Per-container metrics — CPU/mem/IO usage per container + crucially the
  # container_oom_events_total counter that fires the ContainerOOMKilled alert.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    mem_limit: 128m
    privileged: true
    command:
      - --housekeeping_interval=10s
      - --docker_only=true
      - --store_container_labels=false
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # Anonymous Viewer is fine while the port is localhost-only (the SSH tunnel
      # is the auth gate). If we expose Grafana via Traefik later, this comes off
      # and admin/admin sets a real password on first login.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      # localhost-only; tunnel via `ssh -L 3000:localhost:3000` to reach the UI.
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:
